<!-- templates/chart.html -->


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ ticker }} — Stock Insights</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Inter',sans-serif; background:linear-gradient(120deg,#0f2027 0,#203a43 50%,#2c5364 100%); color:#e6edf3; min-height:100vh; }
    .app-card { background:rgba(21,29,43,0.98); padding:32px 32px 22px 32px; border-radius:20px; box-shadow: 0 10px 36px rgba(0,0,0,0.7); }
    canvas { width:100% !important; height:420px !important; }
    .meta-chip { background:#1a2336; padding:8px 16px; border-radius:8px; margin-right:8px; font-size:1.08em; font-weight:500; color:#b6cdfa; }
    .indicator-list { margin-top: 18px; }
    .indicator-list span { background:#232f4b; color:#b6cdfa; border-radius:6px; padding:5px 12px; margin-right:8px; font-size:1.01em; }
    .forecast-summary { margin-top: 18px; background:#1a2336; border-radius:10px; padding:16px 22px; color:#b6f5c9; font-size:1.13em; box-shadow:0 2px 12px #1f6feb22; }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; color:#00eaff !important; text-shadow:0 2px 12px #1f6feb44; }
    .btn-info { background: linear-gradient(90deg,#00eaff 0,#1f6feb 100%); color:#101624; border:0; font-weight:600; }
    .btn-info:hover { background: linear-gradient(90deg,#1f6feb 0,#00eaff 100%); color:#101624; }
    .btn-primary { background: linear-gradient(90deg,#00eaff 0,#1f6feb 100%); color:#101624; border:0; font-weight:600; }
    .btn-primary:hover { background: linear-gradient(90deg,#1f6feb 0,#00eaff 100%); color:#101624; }
    .btn-outline-light { border-color:#1f6feb; color:#b6cdfa; font-weight:600; }
    .btn-outline-light:hover { background:#1f6feb; color:#101624; }
    .form-control, .form-select { background:#232f4b; color:#e6edf3; border:1px solid #2c395a; }
    .form-control:focus, .form-select:focus { border-color:#1f6feb; box-shadow:0 0 0 0.1rem #1f6feb33; }
    .footer { text-align:center; color:#b6cdfa; font-size:0.98em; margin-top:32px; opacity:0.7; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Stock Insights</a>
      <form class="d-flex" role="search" onsubmit="gotoTicker(event)">
        <input id="tickerInput" class="form-control me-2" type="search" placeholder="Ticker (ex: AAPL)" aria-label="Ticker" value="{{ ticker }}">
        <button class="btn btn-outline-success" type="submit">Go</button>
      </form>
    </div>
  </nav>

  <div class="container my-4">
    <div class="app-card">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0" style="font-weight:600; color:#00eaff; letter-spacing:1px;">{{ ticker }} <span style="font-size:0.7em; color:#b6cdfa; font-weight:400;">— Stock Insights</span></h3>
        <div>
          <button id="downloadCsv" class="btn btn-sm btn-secondary me-2">Download CSV</button>
          <a href="/dashboard" class="btn btn-sm btn-outline-light">Back to Dashboard</a>
        </div>
      </div>

      <canvas id="priceChart"></canvas>

      <div class="indicator-list" id="indicators"></div>
      <div class="forecast-summary" id="forecastSummary" style="display:none;"></div>

      <div class="row mt-3">
        <div class="col-md-6">
          <div class="input-group">
            <label class="input-group-text">Period</label>
            <select id="periodSel" class="form-select">
              <option value="1mo" {% if period=='1mo' %}selected{% endif %}>1 month</option>
              <option value="3mo" {% if period=='3mo' %}selected{% endif %}>3 months</option>
              <option value="6mo" {% if period=='6mo' %}selected{% endif %}>6 months</option>
              <option value="1y" {% if period=='1y' %}selected{% endif %}>1 year</option>
            </select>
            <button id="loadBtn" class="btn btn-primary">Load</button>
          </div>
        </div>
        <div class="col-md-6 d-flex gap-2 align-items-center">
          <label class="mb-0">Forecast (days)</label>
          <input id="forecastDays" type="number" value="7" min="1" max="60" class="form-control" style="width:120px;">
          <button id="forecastBtn" class="btn btn-info">Forecast</button>
          <div id="meta" class="ms-3 d-flex align-items-center"></div>
        </div>
      </div>
    </div>
    <div class="footer mt-5">&copy; 2026 Stock Insights by N3x; Modern stock analytics for smarter investing</div>
  </div>

  <script>
  const ticker = "{{ ticker }}";
  let chart;


  async function fetchData(period) {
    const res = await fetch(`/data?ticker=${ticker}&period=${period}`);
    if (!res.ok) {
      alert('Error fetching data');
      return null;
    }
    return await res.json();
  }

  function buildChart(labels, prices, sma, ema, rsi, bb_h, bb_l) {
    const ctx = document.getElementById('priceChart').getContext('2d');
    if (chart) chart.destroy();
    const datasets = [{
      label: 'Close',
      data: prices,
      borderWidth: 2,
      borderColor: '#1f6feb',
      backgroundColor: 'rgba(31,111,235,0.05)',
      tension: 0.15,
      pointRadius: 0
    }];
    if (sma && sma.some(x=>x!=null)) datasets.push({ label: 'SMA20', data: sma, borderColor:'#ffb347', borderWidth:1.5, borderDash:[4,2], pointRadius:0, tension:0.15 });
    if (ema && ema.some(x=>x!=null)) datasets.push({ label: 'EMA20', data: ema, borderColor:'#7fffd4', borderWidth:1.5, borderDash:[2,2], pointRadius:0, tension:0.15 });
    if (bb_h && bb_h.some(x=>x!=null)) datasets.push({ label: 'BB High', data: bb_h, borderColor:'#e06666', borderWidth:1, borderDash:[3,3], pointRadius:0, tension:0.15 });
    if (bb_l && bb_l.some(x=>x!=null)) datasets.push({ label: 'BB Low', data: bb_l, borderColor:'#6fa8dc', borderWidth:1, borderDash:[3,3], pointRadius:0, tension:0.15 });
    chart = new Chart(ctx, {
      type: 'line',
      data: { labels: labels, datasets },
      options: { interaction: { mode: 'index', intersect: false }, scales: { x: { display: true }, y: { display: true } }, plugins: { legend: { display: true } } }
    });
    // Show indicators summary
    const ind = document.getElementById('indicators');
    if (rsi && rsi.length) {
      const lastRsi = rsi[rsi.length-1];
      ind.innerHTML = `<span>RSI(14): <b>${lastRsi ? lastRsi.toFixed(1) : '—'}</b></span>`;
    } else {
      ind.innerHTML = '';
    }
  }

  async function load(period = '1mo') {
    const data = await fetchData(period);
    if (!data) return;
    const labels = data.map(d => d.Date);
    const prices = data.map(d => d.Close);
    const sma = data.map(d => d.SMA20 ?? null);
    const ema = data.map(d => d.EMA20 ?? null);
    const rsi = data.map(d => d.RSI14 ?? null);
    const bb_h = data.map(d => d.BB_H ?? null);
    const bb_l = data.map(d => d.BB_L ?? null);
    buildChart(labels, prices, sma, ema, rsi, bb_h, bb_l);
    const last = prices[prices.length - 1];
    const mean = (prices.reduce((a, b) => a + b, 0) / prices.length).toFixed(2);
    document.getElementById('meta').innerHTML = `<span class="meta-chip">Last: ${last}</span><span class="meta-chip">Average: ${mean}</span><span class="meta-chip">Period: ${period}</span>`;
    window._latestData = data;
    document.getElementById('forecastSummary').style.display = 'none';
  }

  document.getElementById('loadBtn').addEventListener('click', () => {
    const p = document.getElementById('periodSel').value;
    load(p);
  });


  document.getElementById('forecastBtn').addEventListener('click', async () => {
    const days = document.getElementById('forecastDays').value;
    const period = document.getElementById('periodSel').value;
    const res = await fetch(`/predict?ticker=${ticker}&period=${period}&days=${days}`);
    const json = await res.json();
    if (!json.forecast || json.forecast.length === 0) {
      alert('Forecast unavailable');
      return;
    }

    const f_labels = json.forecast.map(f => f.ds);
    const f_values = json.forecast.map(f => f.yhat);

    const baseLen = chart.data.labels.length;
    chart.data.labels = [...chart.data.labels, ...f_labels];

    // remove old Forecast dataset if present
    chart.data.datasets = chart.data.datasets.filter(ds => ds.label !== 'Forecast');

    chart.data.datasets.push({
      label: 'Forecast',
      data: [...Array(baseLen).fill(null), ...f_values],
      borderColor: '#00eaff',
      borderDash: [6, 4],
      borderWidth: 2,
      tension: 0.2,
      pointRadius: 0
    });

    chart.update();
    // Show forecast summary
    let summary = `<b>Forecast for next ${days} days</b><br>`;
    if (json.next_prediction !== null && json.next_prediction !== undefined) {
      summary += `Next predicted close: <b>${json.next_prediction}</b><br>`;
    }
    if (json.variation_pct !== null && json.variation_pct !== undefined) {
      summary += `Variation over period: <b>${json.variation_pct}%</b><br>`;
    }
    if (json.model) {
      summary += `Model: <b>${json.model}</b><br>`;
    }
    if (json.alert) {
      summary += `<span style="color:#ffb347;">⚠️ Significant variation detected!</span>`;
    }
    document.getElementById('forecastSummary').innerHTML = summary;
    document.getElementById('forecastSummary').style.display = 'block';
  });

  function gotoTicker(e) {
    e.preventDefault();
    const t = document.getElementById('tickerInput').value.trim().toUpperCase();
    if (!t) return;
    const params = new URLSearchParams(window.location.search);
    params.set('ticker', t);
    window.location.search = params.toString();
  }

  document.getElementById('downloadCsv').addEventListener('click', () => {
    const data = window._latestData || [];
    if (!data.length) { alert('No data to download'); return; }
    const csv = [Object.keys(data[0]).join(',')].concat(data.map(r => Object.values(r).join(','))).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `${ticker}_${document.getElementById('periodSel').value}.csv`; a.click(); URL.revokeObjectURL(url);
  });

  window.onload = () => load('{{ period }}');
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
