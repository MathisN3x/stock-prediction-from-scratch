<!-- templates/dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stock Insights Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter',sans-serif; background:linear-gradient(120deg,#0f2027 0,#203a43 50%,#2c5364 100%); color:#e6edf3; min-height:100vh; }
    .dashboard-title { font-weight:600; letter-spacing:1px; color:#00eaff; text-shadow:0 2px 12px #1f6feb44; }
    .card { background:rgba(21,29,43,0.98); padding:20px 16px 14px 16px; border-radius:18px; box-shadow:0 6px 32px rgba(0,0,0,0.55); border:0; transition:transform 0.12s; }
    .card:hover { transform:translateY(-4px) scale(1.025); box-shadow:0 12px 36px #1f6feb33; }
    .mini-chart { height:60px !important; }
    .badge-variation { font-size:1em; border-radius:7px; padding:5px 13px; font-weight:600; letter-spacing:0.5px; box-shadow:0 2px 8px #0002; }
    .badge-up { background:linear-gradient(90deg,#1f6feb 0,#00eaff 100%); color:#101624; }
    .badge-down { background:linear-gradient(90deg,#e06666 0,#ffb347 100%); color:#101624; }
    .summary-bar { background:rgba(26,35,54,0.95); border-radius:10px; padding:14px 24px; margin-bottom:22px; color:#b6cdfa; font-size:1.13em; box-shadow:0 2px 12px #1f6feb22; }
    .btn-primary { background: linear-gradient(90deg,#00eaff 0,#1f6feb 100%); color:#101624; border:0; font-weight:600; letter-spacing:0.5px; }
    .btn-primary:hover { background: linear-gradient(90deg,#1f6feb 0,#00eaff 100%); color:#101624; }
    .btn-outline-light { border-color:#1f6feb; color:#b6cdfa; font-weight:600; }
    .btn-outline-light:hover { background:#1f6feb; color:#101624; }
    .ticker-label { font-size:1.25em; font-weight:600; letter-spacing:0.5px; color:#b6f5c9; }
    .ticker-label span { color:#b6cdfa; font-size:0.8em; font-weight:400; }
    .card-details { font-size:1.01em; color:#b6cdfa; margin-bottom:2px; }
    .card-details strong { color:#fff; }
    .footer { text-align:center; color:#b6cdfa; font-size:0.98em; margin-top:32px; opacity:0.7; }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="dashboard-title mb-0">Stock Insights Dashboard</h2>
      <a href="/" class="btn btn-sm btn-outline-light">Home</a>
    </div>

    <div class="summary-bar" id="summaryBar" style="display:none;"></div>
    <div id="list" class="row g-4"></div>
    <div class="footer mt-5">&copy; 2026 Stock Insights by N3x; Modern stock analytics for smarter investing</div>
  </div>

  <script>
  async function load() {
    const res = await fetch(`/dashboard_data?tickers={{ tickers }}&period={{ period }}`);
    const arr = await res.json();
    const container = document.getElementById('list');
    container.innerHTML = '';
    let sum = 0, count = 0, volSum = 0;
    arr.forEach(item => {
      const col = document.createElement('div');
      col.className = 'col-sm-6 col-md-4 col-lg-3';
      const id = `c_${item.ticker}`;
      // Variation badge
      let badge = '';
      if (item.variation_pct !== null) {
        const up = item.variation_pct >= 0;
        badge = `<span class="badge badge-variation ${up ? 'badge-up' : 'badge-down'}">${up ? '+' : ''}${item.variation_pct.toFixed(2)}%</span>`;
      }
      col.innerHTML = `
        <div class="card p-2">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <div class="ticker-label">${item.ticker} <span>(${item.mean})</span></div>
            ${badge}
          </div>
          <div class="card-details">Last: <strong>${item.last}</strong> &nbsp;|&nbsp; Volatility: <strong>${item.volatility}</strong></div>
          <div class="card-details">Baseline: <strong>${item.predicted_baseline ?? '—'}</strong></div>
          <canvas id="${id}" class="mini-chart mt-2"></canvas>
          <div class="mt-3 d-flex justify-content-between gap-2">
            <a href="/compare?ticker1=${item.ticker}&ticker2=SPY&period={{ period }}" class="btn btn-sm btn-outline-light w-50">Compare</a>
            <a href="/?ticker=${item.ticker}&period={{ period }}" class="btn btn-sm btn-primary w-50">View</a>
          </div>
        </div>`;
      container.appendChild(col);

      // draw sparkline using recent values if available
      if (item.recent && item.recent.length) {
        const labels = item.recent.map(r => r.Date);
        const values = item.recent.map(r => r.Close);
        const ctx = document.getElementById(id).getContext('2d');
        new Chart(ctx, { type: 'line', data: { labels, datasets: [{ data: values, borderColor: '#00eaff', borderWidth:2, pointRadius:0, fill:true, backgroundColor:'rgba(31,111,235,0.08)' }] }, options: { responsive:true, plugins:{legend:{display:false}}, scales:{x:{display:false}, y:{display:false}} } });
      }
      // For summary
      if (typeof item.last === 'number') { sum += item.last; count++; }
      if (typeof item.volatility === 'number') volSum += item.volatility;
    });
    // Show summary bar
    if (count > 0) {
      const avg = (sum/count).toFixed(2);
      const avgVol = (volSum/count).toFixed(2);
      document.getElementById('summaryBar').innerHTML =  <b>${count}</b> tickers &mdash; Avg. last price: <b>${avg}</b> &mdash; Avg. volatility: <b>${avgVol}</b>`;
      document.getElementById('summaryBar').style.display = 'block';
    } else {
      document.getElementById('summaryBar').style.display = 'none';
    }
  }

  window.onload = load;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
